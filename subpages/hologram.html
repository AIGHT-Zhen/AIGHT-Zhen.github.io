<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AIGHT-Zhen · 全息投影</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Noto Serif SC',Georgia,serif;background:#0d1117;color:#c9d1d9;overflow-x:hidden}
body{background:radial-gradient(ellipse at 50% 40%,rgba(100,180,220,.06) 0%,transparent 60%),radial-gradient(ellipse at 30% 70%,rgba(120,200,200,.04) 0%,transparent 50%),#0d1117}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:40px}
.btn-back{position:fixed;top:20px;left:20px;z-index:10;width:40px;height:40px;border:1px solid rgba(255,255,255,.15);border-radius:50%;background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-family:inherit;font-size:1rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.btn-back:hover{border-color:rgba(100,200,220,.4);color:#8ec8d8}
.card{max-width:560px;width:100%;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:48px 40px;text-align:center;background:rgba(255,255,255,.02);backdrop-filter:blur(16px);position:relative;overflow:hidden}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.06) 45%,transparent 55%);animation:holoScan 3.5s linear infinite;pointer-events:none}
@keyframes holoScan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.name{font-size:2.4rem;font-weight:700;letter-spacing:.18em;color:#e6edf3;text-shadow:0 0 30px rgba(100,200,220,.3)}
.slogan{font-size:.85rem;color:#8ec8d8;letter-spacing:.2em;margin-top:8px;font-weight:300}
.divider{width:70px;height:1px;background:linear-gradient(90deg,transparent,#8ec8d8,transparent);margin:28px auto}
.about{font-size:.78rem;color:#8b949e;line-height:2.2;font-weight:300}
.links{display:flex;gap:14px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.link{color:#8ec8d8;text-decoration:none;font-size:.72rem;letter-spacing:.15em;border:1px solid rgba(142,200,216,.2);padding:9px 18px;border-radius:6px;transition:all .3s;background:rgba(142,200,216,.03)}
.link:hover{border-color:rgba(142,200,216,.5);box-shadow:0 0 16px rgba(142,200,216,.1);background:rgba(142,200,216,.06)}
</style></head><body>
<div class="page">
  <button class="btn-back" onclick="history.back()">←</button>
  <div class="card">
    <h1 class="name">AIGHT-Zhen</h1>
    <p class="slogan">星海浩瀚 · 笔墨为舟</p>
    <div class="divider"></div>
    <p class="about">在代码与意境之间，构筑数字山海</p>
    <div class="links">
      <a class="link" href="https://github.com/AIGHT-Zhen" target="_blank">GitHub</a>
      <a class="link" href="mailto:aightzhen@github.com">Email</a>
      <a class="link" href="../index.html">主页</a>
    </div>
  </div>
</div>
</body></html>
