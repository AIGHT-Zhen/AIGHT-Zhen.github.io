<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AIGHT-Zhen · 报纸编辑</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Georgia','Noto Serif SC',serif;background:#faf7f0;color:#222;overflow-x:hidden}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.btn-back{position:fixed;top:20px;left:20px;z-index:10;background:none;border:none;color:#999;font-family:inherit;font-size:1.2rem;cursor:pointer;transition:color .3s}
.btn-back:hover{color:#222}
.card{max-width:560px;width:100%;border-top:4px double #222;border-bottom:2px solid #222;padding:44px 36px;text-align:center;background:#fefcf7;column-rule:1px solid #ddd}
.masthead{font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:#888;margin-bottom:20px}
.name{font-size:3rem;font-weight:900;letter-spacing:.05em;color:#111;font-family:'Georgia',serif;line-height:1}
.slogan{font-size:.85rem;color:#555;letter-spacing:.2em;margin:10px 0;font-style:italic}
.divider{width:40px;height:1px;background:#222;margin:20px auto}
.about{font-size:.8rem;color:#555;line-height:2.2;font-family:Georgia,serif}
.links{display:flex;gap:20px;margin-top:18px;justify-content:center;flex-wrap:wrap}
.link{color:#444;text-decoration:none;font-size:.7rem;letter-spacing:.15em;border-bottom:1px solid #ccc;padding-bottom:2px;transition:all .3s}
.link:hover{border-color:#222;color:#111}
</style></head><body>
<div class="page"><button class="btn-back" onclick="history.back()">←</button>
<div class="card"><p class="masthead">PERSONAL EDITION · VOL. I</p><h1 class="name">AIGHT-Zhen</h1><p class="slogan">星海浩瀚 · 笔墨为舟</p><div class="divider"></div><p class="about">在代码与意境之间，构筑数字山海</p><div class="links"><a class="link" href="https://github.com/AIGHT-Zhen" target="_blank">GitHub</a><a class="link" href="mailto:aightzhen@github.com">Email</a><a class="link" href="../index.html">主页</a></div></div>
</div></body></html>
