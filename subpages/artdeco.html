<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AIGHT-Zhen · 装饰艺术</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Georgia','Noto Serif SC',serif;background:#1a1a1a;color:#d4af37;overflow-x:hidden}
body{background:linear-gradient(135deg,#1a1a1a 0%,#2a2020 50%,#1a1a2a 100%)}
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.btn-back{position:fixed;top:20px;left:20px;z-index:10;width:40px;height:40px;border:2px solid #d4af37;background:transparent;color:#d4af37;font-family:inherit;font-size:1rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.btn-back:hover{background:rgba(212,175,55,.1);box-shadow:0 0 15px rgba(212,175,55,.2)}
.card{max-width:540px;width:100%;border:3px solid #d4af37;padding:48px 40px;text-align:center;background:linear-gradient(180deg,rgba(30,25,20,.95),rgba(20,18,22,.95));box-shadow:0 0 40px rgba(212,175,55,.08),inset 0 0 60px rgba(212,175,55,.03);position:relative}
.card::before,.card::after{content:'◆';position:absolute;color:#d4af37;font-size:.6rem;opacity:.4}
.card::before{top:10px;left:16px}.card::after{bottom:10px;right:16px}
.name{font-size:2.6rem;font-weight:900;letter-spacing:.2em;color:#d4af37;text-shadow:0 0 20px rgba(212,175,55,.3);font-family:'Georgia',serif}
.slogan{font-size:.8rem;color:#b8942e;letter-spacing:.3em;margin-top:8px}
.divider{display:flex;align-items:center;gap:12px;margin:24px auto;max-width:200px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,#d4af37,transparent)}
.divider span{color:#d4af37;font-size:.5rem}
.about{font-size:.75rem;color:#a08040;line-height:2.2;letter-spacing:.1em}
.links{display:flex;gap:16px;margin-top:18px;justify-content:center;flex-wrap:wrap}
.link{color:#d4af37;text-decoration:none;font-size:.7rem;letter-spacing:.2em;padding:8px 18px;border:1px solid rgba(212,175,55,.3);transition:all .3s;text-transform:uppercase}
.link:hover{border-color:#d4af37;box-shadow:0 0 12px rgba(212,175,55,.2);background:rgba(212,175,55,.05)}
</style></head><body>
<div class="page"><button class="btn-back" onclick="history.back()">←</button>
<div class="card"><h1 class="name">AIGHT-Zhen</h1><p class="slogan">星海浩瀚 · 笔墨为舟</p><div class="divider"><span>◆</span></div><p class="about">在代码与意境之间，构筑数字山海</p><div class="links"><a class="link" href="https://github.com/AIGHT-Zhen" target="_blank">GitHub</a><a class="link" href="mailto:aightzhen@github.com">Email</a><a class="link" href="../index.html">主页</a></div></div>
</div></body></html>
