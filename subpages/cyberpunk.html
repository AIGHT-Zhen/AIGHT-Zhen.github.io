<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AIGHT-Zhen · 赛博朋克</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Courier New',monospace;background:#050510;color:#0ff;overflow-x:hidden}
body{background:radial-gradient(ellipse at 30% 20%,rgba(255,0,170,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(0,255,255,.06) 0%,transparent 50%),#050510}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:40px}
.btn-back{position:fixed;top:20px;left:20px;z-index:10;width:40px;height:40px;border:1px solid #f0a;border-radius:50%;background:rgba(255,0,170,.15);color:#f0a;font-family:inherit;font-size:1rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.btn-back:hover{background:rgba(255,0,170,.3);box-shadow:0 0 20px rgba(255,0,170,.4)}
.card{max-width:600px;width:100%;border:2px solid #f0a;border-radius:4px;padding:48px 36px;text-align:center;background:rgba(5,5,20,.9);box-shadow:0 0 30px rgba(255,0,170,.2),0 0 60px rgba(0,255,255,.1),inset 0 0 30px rgba(255,0,170,.03);animation:cardPulse 3s ease-in-out infinite;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:2px;background:linear-gradient(90deg,transparent,#0ff,transparent);animation:scanLine 4s linear infinite}
@keyframes scanLine{0%{left:-100%}100%{left:200%}}
@keyframes cardPulse{0%,100%{box-shadow:0 0 30px rgba(255,0,170,.2),0 0 60px rgba(0,255,255,.1)}50%{box-shadow:0 0 50px rgba(255,0,170,.35),0 0 80px rgba(0,255,255,.2)}}
.name{font-size:2.5rem;font-weight:900;letter-spacing:.2em;background:linear-gradient(180deg,#f0a,#0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(0 0 10px rgba(255,0,170,.5))}
.slogan{font-size:.9rem;color:#0ff;letter-spacing:.3em;margin-top:12px;text-transform:uppercase}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,#f0a,#0ff,transparent);margin:28px 0}
.about{font-size:.8rem;color:#aaa;line-height:2;letter-spacing:.08em}
.about em{color:#f0a;font-style:normal}
.links{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.link{color:#0ff;text-decoration:none;font-size:.75rem;letter-spacing:.15em;border:1px solid rgba(0,255,255,.3);padding:8px 18px;border-radius:2px;transition:all .3s}
.link:hover{border-color:#0ff;box-shadow:0 0 15px rgba(0,255,255,.3);background:rgba(0,255,255,.05)}
</style></head><body>
<div class="page">
  <button class="btn-back" onclick="history.back()">←</button>
  <div class="card">
    <h1 class="name">AIGHT-Zhen</h1>
    <p class="slogan">星海浩瀚 · 笔墨为舟</p>
    <div class="divider"></div>
    <p class="about">在<em>代码</em>与<em>意境</em>之间，构筑数字山海</p>
    <div class="links">
      <a class="link" href="https://github.com/AIGHT-Zhen" target="_blank">GITHUB</a>
      <a class="link" href="mailto:aightzhen@github.com">EMAIL</a>
      <a class="link" href="../index.html">返回主页</a>
    </div>
  </div>
</div>
</body></html>
