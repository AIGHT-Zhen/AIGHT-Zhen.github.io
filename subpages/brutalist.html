<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AIGHT-Zhen · 粗野主义</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Impact','Arial Black',sans-serif;background:#f4f4f0;color:#111;overflow-x:hidden}
body{background:linear-gradient(45deg,#f4f4f0 25%,#e8e8e0 25%,#e8e8e0 50%,#f4f4f0 50%,#f4f4f0 75%,#e8e8e0 75%);background-size:40px 40px}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:30px}
.btn-back{position:fixed;top:16px;left:16px;z-index:10;width:44px;height:44px;border:4px solid #111;background:#ff0;color:#111;font-family:inherit;font-size:1.2rem;cursor:pointer;box-shadow:6px 6px 0 #111;transition:all .1s;display:flex;align-items:center;justify-content:center}
.btn-back:hover{box-shadow:2px 2px 0 #111;transform:translate(4px,4px)}
.card{max-width:600px;width:100%;border:4px solid #111;padding:48px 36px;text-align:center;background:#fff;box-shadow:12px 12px 0 #111}
.name{font-size:3rem;font-weight:900;letter-spacing:-.03em;color:#111;text-transform:uppercase;line-height:.9}
.name span{background:#ff0;display:inline-block;padding:0 8px}
.slogan{font-size:1rem;color:#555;margin-top:12px;letter-spacing:.05em;font-family:Georgia,serif;font-weight:400}
.divider{width:80px;height:6px;background:#111;margin:24px auto}
.about{font-size:.85rem;color:#333;line-height:2;font-family:Georgia,serif;font-weight:400}
.links{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.link{color:#111;text-decoration:none;font-size:.8rem;font-weight:700;border:3px solid #111;padding:10px 18px;background:#fff;transition:all .1s;text-transform:uppercase}
.link:hover{background:#111;color:#fff}
</style></head><body>
<div class="page">
  <button class="btn-back" onclick="history.back()">←</button>
  <div class="card">
    <h1 class="name"><span>AIGHT</span>-<span>Zhen</span></h1>
    <p class="slogan">星海浩瀚 · 笔墨为舟</p>
    <div class="divider"></div>
    <p class="about">在代码与意境之间，构筑数字山海</p>
    <div class="links">
      <a class="link" href="https://github.com/AIGHT-Zhen" target="_blank">GitHub</a>
      <a class="link" href="mailto:aightzhen@github.com">Email</a>
      <a class="link" href="../index.html">主页</a>
    </div>
  </div>
</div>
</body></html>
